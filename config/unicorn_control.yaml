joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 30

left_steering_controller:
  type: effort_controllers/JointPositionController
  joint: left_steering_hinge_joint
  pid: {p: 10.0, i: 0.0, d: 0.5}

right_steering_controller:
  type: effort_controllers/JointPositionController
  joint: right_steering_hinge_joint
  pid: {p: 10.0, i: 0.0, d: 0.5}

left_rear_wheel_controller:
  type: effort_controllers/JointVelocityController
  joint: left_rear_wheel_joint
  pid: {p: 10.0, i: 0.0, d: 0.0}

right_rear_wheel_controller:
  type: effort_controllers/JointVelocityController
  joint: right_rear_wheel_joint
  pid: {p: 10.0, i: 0.0, d: 0.0}

left_front_wheel_controller:
  type: effort_controllers/JointVelocityController
  joint: left_front_wheel_joint
  pid: {p: 10.0, i: 0.0, d: 0.0}

right_front_wheel_controller:
  type: effort_controllers/JointVelocityController
  joint: right_front_wheel_joint
  pid: {p: 10.0, i: 0.0, d: 0.0}
